<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PrimeCart</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f7fb;
    }

    /* Navbar */
    .navbar-brand {
      font-weight: bold;
      font-size: 1.5rem;
    }

    /* Hero */
    .hero {
      background: linear-gradient(rgba(13,110,253,0.7), rgba(13,110,253,0.7)),
        url("https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da");
      background-size: cover;
      background-position: center;
      color: white;
      padding: 80px 20px;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      font-weight: bold;
    }

    /* Product cards */
    .product-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    footer {
      background: #0d6efd;
      color: white;
      padding: 20px;
      text-align: center;
      margin-top: 40px;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="#">PrimeCart</a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Shop</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>

        <!-- Search -->
        <input id="searchInput" class="form-control w-50" type="search" placeholder="Search products..." />
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1>Shop Smart, Shop PrimeCart</h1>
      <p>Your one-stop online store for everything you need.</p>
      <button class="btn btn-light btn-lg mt-3">Shop Now</button>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section class="container my-5">
    <h2 class="text-center mb-4">Featured Products</h2>

    <div class="row g-4" id="productList">

      <!-- Product 1 -->
      <div class="col-md-3 product-card">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Headphones">
          <div class="card-body text-center">
            <h5 class="card-title">Wireless Headphones</h5>
            <p class="card-text">$29.99</p>
            <button class="btn btn-primary add-cart">Add to Cart</button>
          </div>
        </div>
      </div>

      <!-- Product 2 -->
      <div class="col-md-3 product-card">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Smart Watch">
          <div class="card-body text-center">
            <h5 class="card-title">Smart Watch</h5>
            <p class="card-text">$59.99</p>
            <button class="btn btn-primary add-cart">Add to Cart</button>
          </div>
        </div>
      </div>

      <!-- Product 3 -->
      <div class="col-md-3 product-card">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Sneakers">
          <div class="card-body text-center">
            <h5 class="card-title">Running Sneakers</h5>
            <p class="card-text">$49.99</p>
            <button class="btn btn-primary add-cart">Add to Cart</button>
          </div>
        </div>
      </div>

      <!-- Product 4 -->
      <div class="col-md-3 product-card">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Backpack">
          <div class="card-body text-center">
            <h5 class="card-title">Travel Backpack</h5>
            <p class="card-text">$39.99</p>
            <button class="btn btn-primary add-cart">Add to Cart</button>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 PrimeCart. All rights reserved.</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- SEARCH FUNCTION -->
  <script>
    const searchInput = document.getElementById("searchInput");

    searchInput.addEventListener("keyup", function () {
      const value = this.value.toLowerCase();
      const products = document.querySelectorAll(".product-card");

      products.forEach(card => {
        card.style.display = card.innerText.toLowerCase().includes(value)
          ? "block"
          : "none";
      });
    });

    // Add to cart demo
    document.querySelectorAll(".add-cart").forEach(btn => {
      btn.addEventListener("click", () => {
        alert("Added to cart!");
      });
    });
  </script>

</body>
</html>
